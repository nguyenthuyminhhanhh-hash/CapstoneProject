<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firewall Admin Dashboard</title>
  <style>
    /* ── Variables ───────────────────────────────────────────────────── */
    :root {
      --bg:          #0d1117;
      --sidebar-bg:  #161b22;
      --card-bg:     #1c2128;
      --border:      #30363d;
      --text:        #c9d1d9;
      --text-dim:    #8b949e;
      --accent:      #58a6ff;
      --danger:      #f85149;
      --warning:     #d29922;
      --success:     #3fb950;
      --purple:      #bc8cff;
    }

    /* ── Reset ───────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ── Login ───────────────────────────────────────────────────────── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .login-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 44px 40px;
      width: 380px;
    }
    .login-logo {
      width: 56px; height: 56px;
      background: var(--danger);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: white;
      margin-bottom: 14px;
    }
    .login-box h1 { font-size: 1.35rem; font-weight: 600; margin-bottom: 6px; }
    .login-box p  { color: var(--text-dim); font-size: 0.875rem; margin-bottom: 28px; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--accent); }

    #login-error {
      color: var(--danger);
      font-size: 0.8rem;
      margin-top: 10px;
      display: none;
      padding: 8px 12px;
      background: rgba(248,81,73,0.1);
      border-radius: 5px;
      border: 1px solid rgba(248,81,73,0.25);
    }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.08s;
      white-space: nowrap;
    }
    .btn:active  { transform: scale(0.96); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--accent);   color: #0d1117; }
    .btn-danger  { background: var(--danger);   color: #fff; }
    .btn-success { background: var(--success);  color: #0d1117; }
    .btn-ghost   {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .btn-sm    { padding: 4px 10px; font-size: 0.78rem; }
    .btn-full  { width: 100%; justify-content: center; padding: 11px; }

    /* ── Layout ──────────────────────────────────────────────────────── */
    #dashboard { display: flex; height: 100vh; }
    .hidden    { display: none !important; }

    /* ── Sidebar ─────────────────────────────────────────────────────── */
    #sidebar {
      width: 220px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 18px 16px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .sidebar-logo-icon {
      width: 30px; height: 30px;
      background: var(--danger);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: white;
      font-weight: bold;
      flex-shrink: 0;
    }
    .sidebar-nav { flex: 1; padding: 10px 0; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      font-size: 0.875rem;
      color: var(--text-dim);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.12s;
      user-select: none;
    }
    .nav-item:hover  { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-item.active {
      color: var(--accent);
      background: rgba(88,166,255,0.1);
      border-left-color: var(--accent);
    }
    .nav-badge {
      margin-left: auto;
      background: var(--danger);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
    }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }

    /* ── Main ────────────────────────────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .page-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    /* ── Page header ─────────────────────────────────────────────────── */
    .main-header {
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--sidebar-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }
    .main-header h2 { font-size: 0.95rem; font-weight: 600; }
    .header-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    /* ── Page body ───────────────────────────────────────────────────── */
    .page-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* ── Error banner ────────────────────────────────────────────────── */
    .error-banner {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      color: var(--danger);
      padding: 9px 13px;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }

    /* ── Blacklist ────────────────────────────────────────────────────── */
    .block-form {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .block-form input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 9px 14px;
      font-size: 0.875rem;
      font-family: monospace;
      outline: none;
      max-width: 340px;
    }
    .block-form input:focus { border-color: var(--danger); }

    .bl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .card-header {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-header h3 { font-size: 0.875rem; font-weight: 600; }
    .card-header span { font-size: 0.75rem; color: var(--text-dim); }
    .card-body { padding: 14px; }

    .ip-list { list-style: none; }
    .ip-item {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 5px;
      background: var(--bg);
      margin-bottom: 5px;
      font-family: monospace;
      font-size: 0.85rem;
    }
    .ip-item:last-child { margin-bottom: 0; }
    .ip-addr { flex: 1; padding-left: 8px; border-left: 3px solid var(--danger); }
    .empty-state { text-align: center; color: var(--text-dim); font-size: 0.85rem; padding: 20px; }

    /* ── Toasts ──────────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 11px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      animation: slide-in 0.2s ease;
      max-width: 340px;
    }
    .toast-success { background: #1a3326; border: 1px solid var(--success); color: var(--success); }
    .toast-error   { background: #3b1111; border: 1px solid var(--danger);  color: var(--danger);  }
    .toast-info    { background: #0f2034; border: 1px solid var(--accent);  color: var(--accent);  }
    @keyframes slide-in { from{transform:translateX(110%);opacity:0} to{transform:none;opacity:1} }

    /* ── Spinner ─────────────────────────────────────────────────────── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── Scrollbar ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
  </style>
</head>
<body>

<!-- ── Toasts ─────────────────────────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ══════════════════════════════════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div style="text-align:center;">
      <div class="login-logo">FW</div>
      <h1>Firewall Admin</h1>
      <p>Sign in to manage your firewall</p>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="inp-user" name="username" autocomplete="username" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="inp-pass" name="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <div id="login-error">Invalid username or password.</div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn" style="margin-top:12px;">
        Sign in
      </button>
    </form>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════
     DASHBOARD
═══════════════════════════════════════════════════════════════════════ -->
<div id="dashboard" class="hidden">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">FW</div>
        <span>Firewall Admin</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="blacklist">
        <span>Blacklist Management</span>
        <span class="nav-badge hidden" id="badge-blacklist"></span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="btn btn-ghost btn-full" id="logout-btn">Logout</button>
    </div>
  </aside>

  <!-- Main content -->
  <div id="main">

    <!-- ── Blacklist ────────────────────────────────────────────────── -->
    <div id="page-blacklist" class="page-container">
      <div class="main-header">
        <h2>Blacklist Management</h2>
        <div class="header-actions">
          <button class="btn btn-ghost btn-sm" id="bl-refresh">Refresh Data</button>
        </div>
      </div>

      <div class="page-body">
        <!-- Block form -->
        <div class="card" style="margin-bottom:18px;">
          <div class="card-header">
            <h3>Block IP Address</h3>
          </div>
          <div class="card-body">
            <div class="block-form">
              <input type="text" id="block-input" placeholder="Enter IPv4 address (e.g. 1.2.3.4)"
                     spellcheck="false" autocomplete="off">
              <button class="btn btn-danger" id="block-btn">Block IP</button>
            </div>
          </div>
        </div>

        <div id="bl-error" class="error-banner hidden"></div>

        <div class="bl-grid">
          <!-- Permanent ban -->
          <div class="card">
            <div class="card-header">
              <h3>Permanent Ban</h3>
              <span>Manual - no expiry</span>
            </div>
            <div class="card-body">
              <ul class="ip-list" id="perm-list">
                <li style="text-align:center;padding:16px;"><span class="spinner"></span></li>
              </ul>
            </div>
          </div>
          <!-- Model AI Auto-ban -->
          <div class="card">
            <div class="card-header">
              <h3>Auto-ban by Model AI</h3>
              <span>Automatic - 1 h expiry</span>
            </div>
            <div class="card-body">
              <ul class="ip-list" id="ddos-list">
                <li style="text-align:center;padding:16px;"><span class="spinner"></span></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div><!-- /page-blacklist -->

  </div><!-- /#main -->
</div><!-- /#dashboard -->

<!-- ═══════════════════════════════════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ── Utilities ──────────────────────────────────────────────────────────────

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3600);
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.remove('hidden');
}
function hideErr(id) { document.getElementById(id).classList.add('hidden'); }

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts
  });
  if (res.status === 401) { showLogin(); throw new Error('session-expired'); }
  return res;
}

// ── Auth ───────────────────────────────────────────────────────────────────

function showLogin()     { document.getElementById('login-screen').classList.remove('hidden');
                           document.getElementById('dashboard').classList.add('hidden'); }
function showDashboard() { document.getElementById('login-screen').classList.add('hidden');
                           document.getElementById('dashboard').classList.remove('hidden'); }

async function checkAuth() {
  try {
    const r = await fetch('/api/me');
    const d = await r.json();
    if (d.authenticated) { showDashboard(); loadBL(); }
    else                 { showLogin(); }
  } catch { showLogin(); }
}

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errEl.style.display = 'none';

  try {
    const r = await fetch('/api/login', { method: 'POST', body: new FormData(e.target) });
    const d = await r.json();
    if (d.ok) { showDashboard(); loadBL(); }
    else      { errEl.style.display = 'block'; }
  } catch { errEl.style.display = 'block'; }

  btn.disabled = false;
  btn.textContent = 'Sign in';
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await fetch('/api/logout', { method: 'POST' });
  showLogin();
});

// ════════════════════════════════════════════════════════════════════════════
// BLACKLIST
// ════════════════════════════════════════════════════════════════════════════

async function loadBL() {
  hideErr('bl-error');
  document.getElementById('perm-list').innerHTML  = '<li style="text-align:center;padding:16px;"><span class="spinner"></span></li>';
  document.getElementById('ddos-list').innerHTML  = '<li style="text-align:center;padding:16px;"><span class="spinner"></span></li>';

  try {
    const r = await api('/api/blacklist');
    if (!r.ok) { showErr('bl-error', `HTTP ${r.status}: ${await r.text()}`); return; }
    const d = await r.json();

    renderIPList('perm-list', d.permanent_ban,  true);
    renderIPList('ddos-list', d.ddos_blacklist, true);

    if (d.errors && d.errors.length) {
      showErr('bl-error', 'Docker: ' + d.errors.join(' | '));
    }

    const total = (d.permanent_ban.length + d.ddos_blacklist.length);
    const badge = document.getElementById('badge-blacklist');
    if (total > 0) { badge.textContent = total; badge.classList.remove('hidden'); }
    else           { badge.classList.add('hidden'); }

  } catch(err) {
    if (err.message !== 'session-expired') showErr('bl-error', 'Failed: ' + err.message);
  }
}

function renderIPList(listId, items, canUnblock) {
  const ul = document.getElementById(listId);
  if (!items.length) {
    ul.innerHTML = '<li class="empty-state">No IPs in this list</li>';
    return;
  }
  ul.innerHTML = items.map(item => `
    <li class="ip-item">
      <div style="flex: 1; padding-left: 8px; border-left: 3px solid var(--danger);">
        <div class="ip-addr" style="padding-left: 0; border-left: none;">${esc(item.ip)}</div>
        ${item.request_id ? `<div style="font-size: 0.72rem; color: var(--text-dim); margin-top: 3px; font-family: monospace;">Req ID: ${esc(item.request_id)}</div>` : ''}
      </div>
      ${canUnblock
        ? `<button class="btn btn-success btn-sm" onclick="doUnblock('${esc(item.ip)}')">Unblock</button>`
        : ''}
    </li>
  `).join('');
}

async function doUnblock(ip) {
  try {
    const r = await api('/api/unblock', { method: 'POST', body: JSON.stringify({ ip }) });
    const d = await r.json();
    if (r.ok) { toast(`Success: ${ip} unblocked`, 'success'); loadBL(); }
    else      { toast(`Error: ${d.detail || 'failed'}`, 'error'); }
  } catch { toast('Network error', 'error'); }
}

document.getElementById('block-btn').addEventListener('click', async () => {
  const ip  = document.getElementById('block-input').value.trim();
  if (!ip) return;
  const btn = document.getElementById('block-btn');
  btn.disabled = true;
  btn.textContent = 'Blocking...';

  try {
    const r = await api('/api/block', { method: 'POST', body: JSON.stringify({ ip }) });
    const d = await r.json();
    if (r.ok) {
      toast(`Success: ${ip} blocked`, 'success');
      document.getElementById('block-input').value = '';
      loadBL();
    } else {
      toast(`Error: ${d.detail || 'failed'}`, 'error');
    }
  } catch { toast('Network error', 'error'); }

  btn.disabled = false;
  btn.textContent = 'Block IP';
});

document.getElementById('block-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('block-btn').click();
});

document.getElementById('bl-refresh').addEventListener('click', loadBL);

// ── Boot ───────────────────────────────────────────────────────────────────
checkAuth();
</script>
</body>
</html>
