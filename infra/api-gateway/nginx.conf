events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Định nghĩa các Upstream
    upstream user_service_stream { server user-service:8000; }
    upstream auth_service_stream { server auth-service:8001; }
    upstream product_service_stream { server product-service:8002; }
    upstream inventory_service_stream { server inventory-service:8003; }
    upstream cart_service_stream { server cart-service:8004; }
    upstream order_service_stream { server order-service:8005; }
    upstream payment_service_stream { server payment-service:8006; }

    real_ip_header X-Forwarded-For;
    set_real_ip_from 172.20.0.0/16;

    #=========================================================================
    #Khai bao vung nho IP, gioi han 5rq/s
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;
    #Nginx tra ve status code 429 khi vuot qua gioi han
    limit_req_status 429;   

    # =========================================================================
    # GIAI ĐOẠN 2: LOG FORMAT (Đã gán biến băm)
    # =========================================================================
    log_format json_lines escape=json '{'
        '"schema": "v1", '
        '"timestamp": "$time_iso8601", '
        '"request_id": "$request_id", '
        '"remote_ip": "$remote_addr", '
        '"method": "$request_method", '
        '"path": "$request_uri", '
        '"path_normalized": "$uri", '
        '"status": $status, '
        '"response_time_ms": "$request_time", '
        '"response_size": $body_bytes_sent, '
        '"upstream": "$upstream_addr", '
        '"user_agent": "$http_user_agent", '
        '"auth_token_hash": "$token_hash", '
        '"user_id_hash": "$user_id_hash", '
        '"user_role": "$user_role", '
        '"sampling_flag": "0", '
        '"waf_action": "", '
        '"waf_rule_id": ""'
    '}';

    server {
        listen 8080;

        access_log /var/log/nginx/access_json.log json_lines;
        error_log /var/log/nginx/error.log warn;

        # =========================================================================
        # GIAI ĐOẠN 2: CẤU HÌNH AUTH_REQUEST
        # =========================================================================
        # Gọi API nội bộ trước khi thực hiện mọi request
        auth_request /_verify_internal;

        # Hứng các header từ auth-service trả về và gán vào biến log
        auth_request_set $token_hash $upstream_http_x_token_hash;
        auth_request_set $user_id_hash $upstream_http_x_user_id_hash;
        auth_request_set $user_role $upstream_http_x_user_role;

        # =========================================================================
        # CẤU HÌNH CHUNG
        # =========================================================================
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Bơm thông tin xuống Backend
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Token-Hash $token_hash;
        proxy_set_header X-User-Id-Hash $user_id_hash;
        proxy_set_header X-User-Role $user_role;

        # =========================================================================
        # LOCATION NỘI BỘ (Chỉ Nginx gọi được)
        # =========================================================================
        location = /_verify_internal {
            internal;
            auth_request off;
            proxy_pass http://auth_service_stream/api/auth/verify-internal;
            
            # Tối ưu: Không gửi body sang auth-service
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # =========================================================================
        # ROUTES CHÍNH
        # =========================================================================
        # (Ngoại lệ: Không bắt auth_request khi đang cố đăng nhập/đăng ký)
        location /api/auth/login {
            auth_request off;
            #Ap dung Rate limting cho /login để chống brute-force
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://auth_service_stream/api/auth/login;
        }
        
        location /api/users {
            # Tạm tắt auth_request cho /users để cho phép đăng ký tài khoản mới
            #auth_request off; 
            
            proxy_pass http://user_service_stream/api/users;
        }

        # Các route còn lại sẽ đi qua auth_request
        location /api/auth { proxy_pass http://auth_service_stream; }
        location /api/products { proxy_pass http://product_service_stream; }
        location /api/inventory { proxy_pass http://inventory_service_stream; }
        location /api/cart { 
            # Áp dụng Rate Limit chống Spam giỏ hàng (Du di 20 request)
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://cart_service_stream; 
        }

        # GIAI ĐOẠN 3: TEST SAMPLING FLAG TRÊN ORDER SERVICE        
        location /api/orders { 
            proxy_pass http://order_service_stream; 
            
            # Khôi phục lại các header bị Nginx ghi đè khi dùng proxy_set_header trong location
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Token-Hash $token_hash;
            proxy_set_header X-User-Id-Hash $user_id_hash;
            proxy_set_header X-User-Role $user_role;
            
            # Đưa cờ về 0 (Trạng thái bình thường).
            proxy_set_header X-Sampling-Flag "0";
        }

        location /api/payments { proxy_pass http://payment_service_stream; }
    }
}